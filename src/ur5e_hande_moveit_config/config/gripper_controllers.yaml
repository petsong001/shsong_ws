controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # --- Controller Types Declaration ---
    hande_gripper_controller:
      type: position_controllers/GripperActionController # This type is correct for MoveIt

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

hande_gripper_controller:
  ros__parameters:
    # 🚨 CORRECTION 1: Changed 'joints' to the required singular 'joint'
    # 🚨 CORRECTION 2: Used the full, correct joint name from your URDF
    joint: robotiq_hande_left_finger_joint 
    
    # Optional parameters (kept as-is)
    goal_tolerance: 0.01
    stall_velocity_threshold: 0.01
    stall_timeout: 0.2
