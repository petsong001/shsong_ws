# MoveIt Configuration for REAL PHYSICAL ROBOT
moveit_simple_controller_manager:
  controller_names:
    - scaled_joint_trajectory_controller
    - hande_gripper_controller

  # Configuration for the ARM (Scaled for safety)
  scaled_joint_trajectory_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

  # Configuration for the GRIPPER
  hande_gripper_controller:
    action_ns: gripper_cmd
    type: GripperCommand
    default: true
    joints:
      - robotiq_hande_left_finger_joint
