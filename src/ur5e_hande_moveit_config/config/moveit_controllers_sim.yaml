# FILE: moveit_controllers_sim.yaml
moveit_simple_controller_manager:
  controller_names:
    - scaled_joint_trajectory_controller
    - hande_gripper_controller

  scaled_joint_trajectory_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

  hande_gripper_controller:
    action_ns: follow_joint_trajectory
    type: FollowJointTrajectory
    default: true
    joints:
      # Use only the active joint; MoveIt plans for this one specifically
      - robotiq_hande_left_finger_joint